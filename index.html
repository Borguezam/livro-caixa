<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Livro-Caixa</title>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  :root{
    --bg: #14171c;
    --bg-raised: #1b1f26;
    --line: #2a2f38;
    --ink: #e8e6e1;
    --ink-dim: #8b93a1;
    --green: #3ddc97;
    --red: #e2725b;
    --gold: #d4a24c;
    --mono: 'SF Mono', 'JetBrains Mono', Consolas, monospace;
    --sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }
  *{box-sizing:border-box;}
  body{
    margin:0; background:var(--bg); color:var(--ink);
    font-family:var(--sans); min-height:100vh;
    padding: 24px 16px 80px;
  }
  .wrap{max-width:720px; margin:0 auto;}

  header{display:flex; justify-content:space-between; align-items:baseline; margin-bottom:24px; flex-wrap:wrap; gap:10px;}
  header h1{
    font-family:var(--mono); font-size:20px; letter-spacing:0.5px; margin:0;
    display:flex; align-items:center; gap:8px;
  }
  header h1 .dot{width:8px; height:8px; border-radius:50%; background:var(--green); display:inline-block;}
  .sync-status{font-family:var(--mono); font-size:12px; color:var(--ink-dim);}

  .card{
    background:var(--bg-raised); border:1px solid var(--line); border-radius:10px;
    padding:18px; margin-bottom:16px;
  }
  .card h2{
    font-size:11px; text-transform:uppercase; letter-spacing:1.5px;
    color:var(--ink-dim); margin:0 0 14px; font-weight:600;
  }

  .drive-box{display:flex; justify-content:space-between; align-items:center; gap:12px; flex-wrap:wrap;}
  .drive-box p{margin:0; font-size:13px; color:var(--ink-dim); line-height:1.5;}

  button{
    font-family:var(--sans); font-size:13px; font-weight:600; cursor:pointer;
    border-radius:7px; padding:10px 16px; border:1px solid transparent;
    transition:opacity .15s;
  }
  button:hover{opacity:0.85;}
  button:disabled{opacity:0.4; cursor:not-allowed;}
  .btn-primary{background:var(--green); color:#0b1410;}
  .btn-gold{background:var(--gold); color:#231a06;}
  .btn-ghost{background:transparent; color:var(--ink); border-color:var(--line);}
  .btn-red{background:var(--red); color:#2a0e08;}

  .toggle-row{display:flex; gap:8px; margin-bottom:14px;}
  .toggle-btn{
    flex:1; background:var(--bg); border:1px solid var(--line); color:var(--ink-dim);
    padding:9px; border-radius:7px; font-size:13px; font-weight:600; cursor:pointer;
  }
  .toggle-btn.active[data-tipo="gasto"]{background:rgba(226,114,91,0.15); color:var(--red); border-color:var(--red);}
  .toggle-btn.active[data-tipo="receita"]{background:rgba(61,220,151,0.15); color:var(--green); border-color:var(--green);}

  .form-grid{display:grid; grid-template-columns:1fr 1fr; gap:10px;}
  .form-grid .full{grid-column:1/-1;}
  label{display:block; font-size:11px; color:var(--ink-dim); margin-bottom:5px; text-transform:uppercase; letter-spacing:0.5px;}
  input, select{
    width:100%; background:var(--bg); border:1px solid var(--line); color:var(--ink);
    border-radius:6px; padding:9px 10px; font-family:var(--sans); font-size:14px;
  }
  input:focus, select:focus{outline:none; border-color:var(--gold);}

  table{width:100%; border-collapse:collapse; font-size:13px;}
  th{
    text-align:left; font-size:10px; text-transform:uppercase; letter-spacing:1px;
    color:var(--ink-dim); font-weight:600; padding:6px 8px; border-bottom:1px solid var(--line);
  }
  td{padding:9px 8px; border-bottom:1px solid var(--line); font-family:var(--mono);}
  tr:last-child td{border-bottom:none;}
  .tag{
    font-family:var(--sans); font-size:11px; padding:2px 8px; border-radius:20px;
    background:rgba(212,162,76,0.15); color:var(--gold); white-space:nowrap;
  }
  .tag.receita{background:rgba(61,220,151,0.15); color:var(--green);}
  .val{text-align:right;}
  .val.gasto{color:var(--red);}
  .val.receita{color:var(--green);}
  .del{color:var(--ink-dim); cursor:pointer; text-align:center; font-family:var(--sans);}
  .del:hover{color:var(--red);}
  .empty{color:var(--ink-dim); font-size:13px; padding:14px 0; text-align:center;}

  .totals{display:flex; gap:14px; flex-wrap:wrap; margin-top:4px;}
  .totals .item{flex:1; min-width:110px;}
  .totals .item .n{font-family:var(--mono); font-size:20px;}
  .totals .item .n.saldo-pos{color:var(--green);}
  .totals .item .n.saldo-neg{color:var(--red);}
  .totals .item .l{font-size:11px; color:var(--ink-dim); text-transform:uppercase; letter-spacing:0.5px;}

  #chartWrap{position:relative; height:220px;}

  .toast{
    position:fixed; bottom:20px; left:50%; transform:translateX(-50%);
    background:var(--bg-raised); border:1px solid var(--line); color:var(--ink);
    padding:10px 18px; border-radius:8px; font-size:13px; font-family:var(--mono);
    opacity:0; pointer-events:none; transition:opacity .25s; max-width:90vw; text-align:center;
  }
  .toast.show{opacity:1;}
</style>
</head>
<body>
<div class="wrap">

  <header>
    <h1><span class="dot"></span>livro-caixa</h1>
    <span class="sync-status" id="syncStatus">não conectado</span>
  </header>

  <div class="card">
    <h2>Google Drive</h2>
    <div class="drive-box">
      <p id="driveMsg">Conecte sua conta para poder sincronizar. Nada é enviado até você apertar "Sincronizar".</p>
      <div style="display:flex; gap:8px;">
        <button class="btn-primary" id="connectBtn">Conectar Google Drive</button>
        <button class="btn-gold" id="syncBtn" disabled>Sincronizar</button>
      </div>
    </div>
  </div>

  <div class="card">
    <h2>Balanço</h2>
    <div class="totals">
      <div class="item"><div class="n" style="color:var(--green);" id="totalReceitas">R$ 0,00</div><div class="l">receitas</div></div>
      <div class="item"><div class="n" style="color:var(--red);" id="totalGastos">R$ 0,00</div><div class="l">gastos</div></div>
      <div class="item"><div class="n" id="saldo">R$ 0,00</div><div class="l">saldo</div></div>
    </div>
  </div>

  <div class="card">
    <h2>Novo lançamento</h2>
    <div class="toggle-row">
      <button class="toggle-btn active" data-tipo="gasto" id="tipoGasto">− Gasto</button>
      <button class="toggle-btn" data-tipo="receita" id="tipoReceita">+ Receita</button>
    </div>
    <div class="form-grid">
      <div>
        <label>Data</label>
        <input type="date" id="fData">
      </div>
      <div>
        <label>Categoria</label>
        <select id="fCategoria"></select>
      </div>
      <div>
        <label>Valor (R$)</label>
        <input type="number" step="0.01" id="fValor" placeholder="0,00">
      </div>
      <div>
        <label>Nota (opcional)</label>
        <input type="text" id="fNota" placeholder="ex: mercado do mês">
      </div>
      <div class="full">
        <button class="btn-primary" id="addBtn" style="width:100%;">Adicionar</button>
      </div>
    </div>
  </div>

  <div class="card">
    <h2>Gastos por categoria</h2>
    <div id="chartWrap"><canvas id="catChart"></canvas></div>
  </div>

  <div class="card">
    <h2>Lançamentos</h2>
    <table>
      <thead><tr><th>Data</th><th>Categoria</th><th>Nota</th><th style="text-align:right;">Valor</th><th></th></tr></thead>
      <tbody id="rows"></tbody>
    </table>
    <div class="empty" id="emptyMsg">Nenhum lançamento ainda.</div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
/* ======================= CONFIG =======================
   Cole aqui o Client ID que você criar no Google Cloud Console.
   Veja o README.md para o passo a passo.
======================================================== */
const GOOGLE_CLIENT_ID = "258404717727-in5ak7i4ovo23qu6q0vgvgcl9drrq3f7.apps.googleusercontent.com";
const DRIVE_FILE_NAME = "livro-caixa-gastos.csv";
const SCOPE = "https://www.googleapis.com/auth/drive.file";

const CATEGORIAS = {
  gasto: ['Moradia','Alimentação','Transporte','Lazer','Saúde','Trading / Ferramentas','Outros'],
  receita: ['Salário','Trading','Freelance','Outros']
};

/* ======================= ESTADO ======================= */
let expenses = migrar(JSON.parse(localStorage.getItem('lc_expenses') || '[]'));
let driveFileId = localStorage.getItem('lc_drive_file_id') || null;
let accessToken = null;
let tokenClient = null;
let chart = null;
let tipoAtual = 'gasto';

const $ = (id) => document.getElementById(id);

function migrar(list){
  // compatibilidade com dados salvos antes de tipo/ts/deleted existirem
  return list.map(e => ({
    id: e.id,
    tipo: e.tipo || 'gasto',
    data: e.data,
    categoria: e.categoria,
    valor: Number(e.valor),
    nota: e.nota || '',
    ts: e.ts || Date.now(),
    deleted: !!e.deleted
  }));
}

function saveLocal(){
  localStorage.setItem('lc_expenses', JSON.stringify(expenses));
}

function toast(msg){
  const t = $('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2600);
}

function fmt(n){
  return n.toLocaleString('pt-BR', {style:'currency', currency:'BRL'});
}

/* ======================= FORM: toggle tipo ======================= */
function setTipo(tipo){
  tipoAtual = tipo;
  $('tipoGasto').classList.toggle('active', tipo === 'gasto');
  $('tipoReceita').classList.toggle('active', tipo === 'receita');
  const sel = $('fCategoria');
  sel.innerHTML = CATEGORIAS[tipo].map(c => `<option>${c}</option>`).join('');
}
$('tipoGasto').addEventListener('click', () => setTipo('gasto'));
$('tipoReceita').addEventListener('click', () => setTipo('receita'));

/* ======================= RENDER ======================= */
function render(){
  const rows = $('rows');
  const empty = $('emptyMsg');
  rows.innerHTML = '';

  const visiveis = expenses.filter(e => !e.deleted);

  if(visiveis.length === 0){
    empty.style.display = 'block';
  } else {
    empty.style.display = 'none';
    [...visiveis].sort((a,b)=> b.data.localeCompare(a.data)).forEach(e => {
      const tr = document.createElement('tr');
      const sinal = e.tipo === 'receita' ? '+' : '−';
      tr.innerHTML = `
        <td>${e.data}</td>
        <td><span class="tag ${e.tipo}">${e.categoria}</span></td>
        <td style="font-family:var(--sans); color:var(--ink-dim);">${e.nota || '—'}</td>
        <td class="val ${e.tipo}">${sinal} ${fmt(Number(e.valor))}</td>
        <td class="del" data-id="${e.id}">✕</td>
      `;
      rows.appendChild(tr);
    });
    rows.querySelectorAll('.del').forEach(el => {
      el.addEventListener('click', () => {
        const item = expenses.find(e => e.id === el.dataset.id);
        if(item){ item.deleted = true; item.ts = Date.now(); }
        saveLocal(); render();
      });
    });
  }

  const totalReceitas = visiveis.filter(e=>e.tipo==='receita').reduce((s,e)=> s + Number(e.valor), 0);
  const totalGastos = visiveis.filter(e=>e.tipo==='gasto').reduce((s,e)=> s + Number(e.valor), 0);
  const saldo = totalReceitas - totalGastos;

  $('totalReceitas').textContent = fmt(totalReceitas);
  $('totalGastos').textContent = fmt(totalGastos);
  const saldoEl = $('saldo');
  saldoEl.textContent = fmt(saldo);
  saldoEl.className = 'n ' + (saldo >= 0 ? 'saldo-pos' : 'saldo-neg');

  renderChart(visiveis);
}

function renderChart(visiveis){
  const byCat = {};
  visiveis.filter(e => e.tipo === 'gasto').forEach(e => byCat[e.categoria] = (byCat[e.categoria]||0) + Number(e.valor));
  const labels = Object.keys(byCat);
  const data = Object.values(byCat);

  if(chart) chart.destroy();
  chart = new Chart($('catChart'), {
    type: 'doughnut',
    data: {
      labels,
      datasets: [{
        data,
        backgroundColor: ['#e2725b','#d4a24c','#6b8fd4','#b07cd4','#d46b9e','#8b93a1','#3ddc97'],
        borderColor: '#1b1f26',
        borderWidth: 2,
      }]
    },
    options: {
      plugins: { legend: { position: 'right', labels: { color: '#e8e6e1', font: {family: 'monospace', size: 11} } } },
      maintainAspectRatio: false
    }
  });
}

/* ======================= FORM ======================= */
$('fData').valueAsDate = new Date();
setTipo('gasto');

$('addBtn').addEventListener('click', () => {
  const data = $('fData').value;
  const categoria = $('fCategoria').value;
  const valor = parseFloat($('fValor').value);
  const nota = $('fNota').value.trim();

  if(!data || isNaN(valor) || valor <= 0){
    toast('Preencha data e valor corretamente.');
    return;
  }

  expenses.push({ id: crypto.randomUUID(), tipo: tipoAtual, data, categoria, valor, nota, ts: Date.now(), deleted:false });
  saveLocal(); render();

  $('fValor').value = '';
  $('fNota').value = '';
  toast((tipoAtual === 'gasto' ? 'Gasto' : 'Receita') + ' adicionado (ainda não sincronizado).');
});

/* ======================= GOOGLE DRIVE ======================= */
function updateDriveUI(){
  if(accessToken){
    $('syncBtn').disabled = false;
    $('connectBtn').textContent = 'Conectado ✓';
    $('syncStatus').textContent = driveFileId ? 'conectado · arquivo vinculado' : 'conectado · ainda não sincronizado';
    $('driveMsg').textContent = 'Pronto para sincronizar quando você quiser.';
  } else {
    $('syncBtn').disabled = true;
    $('syncStatus').textContent = 'não conectado';
  }
}

function initGoogle(){
  if(GOOGLE_CLIENT_ID.includes('COLE_SEU_CLIENT_ID')){
    $('driveMsg').textContent = 'Configure o GOOGLE_CLIENT_ID no código (veja README.md) antes de conectar.';
    $('connectBtn').disabled = true;
    return;
  }
  tokenClient = google.accounts.oauth2.initTokenClient({
    client_id: GOOGLE_CLIENT_ID,
    scope: SCOPE,
    callback: (resp) => {
      if(resp.error){ toast('Erro ao conectar: ' + resp.error); return; }
      accessToken = resp.access_token;
      updateDriveUI();
      toast('Conectado ao Google Drive.');
    }
  });
}

$('connectBtn').addEventListener('click', () => {
  if(!tokenClient) return;
  tokenClient.requestAccessToken({ prompt: accessToken ? '' : 'consent' });
});

function expensesToCSV(){
  const header = 'id,tipo,data,categoria,valor,nota,ts,deleted\n';
  const lines = expenses
    .sort((a,b)=> a.data.localeCompare(b.data))
    .map(e => [e.id, e.tipo, e.data, e.categoria, e.valor, (e.nota||'').replace(/,/g,';'), e.ts, e.deleted].join(','));
  return header + lines.join('\n');
}

function parseCSV(text){
  const lines = text.trim().split('\n').slice(1); // pula header
  return lines.filter(Boolean).map(line => {
    const parts = line.split(',');
    const [id, tipo, data, categoria, valor, nota, ts, deleted] = parts;
    return {
      id,
      tipo: tipo || 'gasto',
      data,
      categoria,
      valor: parseFloat(valor),
      nota: nota || '',
      ts: Number(ts) || Date.now(),
      deleted: deleted === 'true'
    };
  });
}

async function downloadFromDrive(fileId){
  const res = await fetch(`https://www.googleapis.com/drive/v3/files/${fileId}?alt=media`, {
    headers: { Authorization: `Bearer ${accessToken}` }
  });
  if(!res.ok) throw new Error(await res.text());
  return parseCSV(await res.text());
}

function mergeExpenses(local, remote){
  // last-write-wins: para cada id, mantém o registro com ts mais recente
  const byId = new Map();
  [...remote, ...local].forEach(e => {
    const atual = byId.get(e.id);
    if(!atual || e.ts >= atual.ts) byId.set(e.id, e);
  });
  return Array.from(byId.values());
}

async function findExistingFile(){
  const q = encodeURIComponent(`name='${DRIVE_FILE_NAME}' and trashed=false`);
  const res = await fetch(`https://www.googleapis.com/drive/v3/files?q=${q}&fields=files(id,name)`, {
    headers: { Authorization: `Bearer ${accessToken}` }
  });
  const json = await res.json();
  if(json.files && json.files.length > 0) return json.files[0].id;
  return null;
}

async function uploadToDrive(){
  const csv = expensesToCSV();
  const metadata = { name: DRIVE_FILE_NAME, mimeType: 'text/csv' };

  const boundary = '-------lc-boundary';
  const body =
    `--${boundary}\r\nContent-Type: application/json; charset=UTF-8\r\n\r\n${JSON.stringify(metadata)}\r\n` +
    `--${boundary}\r\nContent-Type: text/csv\r\n\r\n${csv}\r\n--${boundary}--`;

  const isUpdate = !!driveFileId;
  const url = isUpdate
    ? `https://www.googleapis.com/upload/drive/v3/files/${driveFileId}?uploadType=multipart`
    : `https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart`;

  const res = await fetch(url, {
    method: isUpdate ? 'PATCH' : 'POST',
    headers: {
      Authorization: `Bearer ${accessToken}`,
      'Content-Type': `multipart/related; boundary=${boundary}`
    },
    body
  });

  if(!res.ok){
    const errText = await res.text();
    throw new Error(errText);
  }
  const json = await res.json();
  return json.id;
}

$('syncBtn').addEventListener('click', async () => {
  if(!accessToken){ toast('Conecte o Google Drive primeiro.'); return; }
  $('syncBtn').disabled = true;
  $('syncBtn').textContent = 'Sincronizando...';
  try {
    if(!driveFileId){
      driveFileId = await findExistingFile();
    }

    // 1. baixa o que já existe no Drive (pode ter sido lançado no outro celular)
    let remote = [];
    if(driveFileId){
      remote = await downloadFromDrive(driveFileId);
    }

    // 2. mescla por "última edição vence" (usa timestamp de cada lançamento)
    expenses = mergeExpenses(expenses, remote);
    saveLocal();
    render();

    // 3. sobe o resultado mesclado
    const id = await uploadToDrive();
    driveFileId = id;
    localStorage.setItem('lc_drive_file_id', driveFileId);
    updateDriveUI();
    const visiveis = expenses.filter(e=>!e.deleted).length;
    toast('Sincronizado com o Google Drive ✓ (' + visiveis + ' lançamentos)');
  } catch(err){
    console.error(err);
    toast('Falha ao sincronizar. Veja o console (F12).');
  } finally {
    $('syncBtn').disabled = false;
    $('syncBtn').textContent = 'Sincronizar';
  }
});

/* ======================= INIT ======================= */
window.addEventListener('load', () => {
  render();
  // Google Identity Services carrega de forma assíncrona
  const wait = setInterval(() => {
    if(window.google && google.accounts){
      clearInterval(wait);
      initGoogle();
    }
  }, 100);
});
</script>
</body>
</html>
